<!DOCTYPE html>
<html lang="ru">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description"
        content="Поиск фильмов и сериалов. Найди любимое кино по названию, жанру, году или рейтингу">
    <title>Поиск фильмов</title>
    <meta property="og:title" content="Поиск фильмов и сериалов">
    <meta property="og:description" content="Найди фильмы и сериалы по названию, жанру, рейтингу и году выпуска">
    <meta property="og:type" content="website">

    <link rel="stylesheet" href="style/fonts.css">
    <link rel="stylesheet" href="style/colors.css">
    <link rel="stylesheet" href="style/common.css">
    <link rel="stylesheet" href="style/index.css">

    <script src="script/theme.js" defer></script>
    <script src="script/burger.js" defer></script>
</head>

<body>
    <header class="header">
        <div class="container">
            <div class="header__inner">

                <a href="index.html" class="header__logo" aria-label="На главную">
                    <img src="./assets/icons/logo.svg" alt="FilmSearch" width="342" height="70">
                </a>

                <div class="header__panel">
                    <nav class="header__nav">
                        <ul class="header__menu">
                            <li class="header__menu-item">
                                <a href="movie_list/index.html" class="header__menu-link">Фильмы</a>
                            </li>
                            <li class="header__menu-item">
                                <a href="series_list/index.html" class="header__menu-link">Сериалы</a>
                            </li>
                        </ul>
                    </nav>

                    <div class="theme-toggle">
                        <span>Тёмная тема</span>
                        <button class="theme-toggle__button" type="button" aria-label="Переключить тему">
                            <span class="theme-toggle__circle"></span>
                        </button>
                    </div>
                </div>

                <button class="burger" type="button" aria-label="Открыть меню">
                    <span></span>
                    <span></span>
                    <span></span>
                </button>
            </div>
        </div>
    </header>
    <section class="hero">
        <div class="hero__left">
                <h1 class="hero__title">
                    Что сегодня посмотреть?
                </h1>
                <img 
                    src="./assets/icons/hero-arrow.svg" 
                    alt=""
                    class="hero__arrow"
                >
        </div>
        <div class="hero__right">
            <img
                class="hero__image"
                src="./assets/Images/hero-bg.png"
                alt="Космонавты"
            >
            <div class="hero__gradient"></div>
        </div>
    </section>
    <section class="gallery">
        <button class="gallery__arrow gallery__arrow--prev" aria-label="Назад" disabled>
            <svg width="20" height="40" viewBox="0 0 26 44" fill="none" xmlns="http://www.w3.org/2000/svg">
                <path d="M1.76758 1.76758L21.7676 21.7676L1.76758 41.7676" stroke="currentColor" stroke-width="5"/>
            </svg>
        </button>
        <ul class="gallery__list">
            <li class="movie-card">
                <div class="movie-card__overlay">
                    <div class="movie-card__rating">9.8</div>
                    <h3 class="movie-card__title">Проклятое королевство</h3>        
                </div>
                <div class="movie-card__media">
                    <img src="./assets/Images/movie-poster-1.png" alt="Постер фильма «Проклятое королевство»" class="movie-card__poster">
                    <div class="movie-card__gradient" aria-hidden="true"></div>
                </div>
            </li>
            <li class="movie-card">
                <div class="movie-card__overlay">
                    <div class="movie-card__rating">9.7</div>
                    <h3 class="movie-card__title">Красный код</h3>
                </div>
                <div class="movie-card__media">
                    <img src="./assets/Images/movie-poster-2.png" alt="Постер фильма «Красный код»" class="movie-card__poster">
                    <div class="movie-card__gradient" aria-hidden="true"></div>
                </div>
            </li>
            <li class="movie-card">
                <div class="movie-card__overlay">
                    <div class="movie-card__rating">8.7</div>
                    <h3 class="movie-card__title">Путеводная звезда</h3>
                </div>
                <div class="movie-card__media">
                    <img src="./assets/Images/movie-poster-3.png" alt="Постер фильма «Путеводная звезда»" class="movie-card__poster">
                    <div class="movie-card__gradient" aria-hidden="true"></div>
                </div>
            </li>
        </ul>
        <button class="gallery__arrow gallery__arrow--next" aria-label="Вперед">
            <svg width="20" height="40" viewBox="0 0 26 44" fill="none" xmlns="http://www.w3.org/2000/svg">
                <path d="M1.76758 1.76758L21.7676 21.7676L1.76758 41.7676" stroke="currentColor" stroke-width="5"/>
            </svg>
        </button>
    </section>
    <footer class="footer"></footer>
    <script>
    </script>
</body>

</html>
